<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora - Sistema Vidigal</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.85);
            --primary: #ff1e1e;
            --primary-glow: rgba(255, 30, 30, 0.6);
            --primary-hover: #cc0000;
            --text: #ffffff;
            --text-muted: #888888;
            --border: #333;
            --success: #00ff88;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Rajdhani', sans-serif; /* Fonte mais "tech" e moderna */
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 0%, #300000 0%, transparent 50%),
                linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%),
                url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMjAiIGN5PSIyMCIgcj0iMSIgZmlsbD0icmdiYSgyNTUsIDI1NSwgMjU1LCAwLjA1KSIvPjwvc3ZnPg==');
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* --- PRELOADER --- */
        #preloader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #050505;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .preloader-content {
            text-align: center;
        }

        .progress-bar {
            width: 300px;
            height: 4px;
            background: #222;
            margin: 20px auto;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .progress {
            width: 0%;
            height: 100%;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            animation: carregar 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .preloader-text {
            color: var(--primary);
            font-family: monospace;
            font-size: 14px;
            letter-spacing: 3px;
            animation: piscar 1s infinite;
        }

        @keyframes carregar {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        @keyframes piscar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* --- EFEITO GLITCH --- */
        .glitch {
            font-family: 'Permanent Marker', cursive;
            font-size: 4rem;
            color: var(--text);
            position: relative;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 red;
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 blue;
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); }
            20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); }
            60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); }
            100% { clip-path: inset(30% 0 20% 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); }
            20% { clip-path: inset(30% 0 20% 0); }
            40% { clip-path: inset(70% 0 10% 0); }
            60% { clip-path: inset(20% 0 50% 0); }
            80% { clip-path: inset(50% 0 30% 0); }
            100% { clip-path: inset(5% 0 80% 0); }
        }

        /* --- CONTAINER PRINCIPAL --- */
        .container {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 550px;
            border-top: 4px solid var(--primary);
            position: relative;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards 2.2s; /* Aparece após o preloader */
        }

        @keyframes fadeInUp {
            to { transform: translateY(0); opacity: 1; }
        }

        h1.title {
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #ccc;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
            background: rgba(0, 0, 0, 0.8);
        }

        /* --- SWITCH CUSTOMIZADO (Parceria) --- */
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .switch-container label {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        /* --- SELEÇÃO DE ITENS --- */
        .item-selector {
            display: flex;
            gap: 10px;
        }

        .item-selector select { flex: 3; }
        .item-selector input { flex: 1; text-align: center; }

        .btn-add {
            flex: 1;
            background: linear-gradient(45deg, #11998e, #38ef7d);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3);
        }

        .btn-add:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(56, 239, 125, 0.5);
        }

        .btn-add:active { transform: scale(0.95); }

        /* --- LISTA DE ITENS --- */
        .items-list {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            min-height: 60px;
            margin-bottom: 25px;
            max-height: 150px;
            overflow-y: auto;
        }

        /* Scrollbar customizada */
        .items-list::-webkit-scrollbar { width: 6px; }
        .items-list::-webkit-scrollbar-track { background: transparent; }
        .items-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 5px;
            border-radius: 4px;
            border-left: 3px solid var(--primary);
            animation: slideIn 0.3s ease;
            font-size: 1.1rem;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .remove-btn {
            color: #ff4444;
            cursor: pointer;
            font-weight: bold;
            background: rgba(255, 68, 68, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            transition: 0.3s;
        }

        .remove-btn:hover { background: #ff4444; color: white; }

        /* --- RESULTADOS --- */
        .results {
            background: linear-gradient(135deg, rgba(20,20,20,1) 0%, rgba(40,10,10,1) 100%);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid #441111;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .results p {
            margin: 10px 0;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }
        .results p:last-child { border-bottom: none; padding-bottom: 0; }

        .results span {
            font-family: monospace;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .val-total { color: var(--text); }
        .val-comissao { color: var(--success); text-shadow: 0 0 10px rgba(0, 255, 136, 0.4); }
        .val-deposito { color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }

        /* --- BOTÃO ENVIAR --- */
        .btn-enviar {
            width: 100%;
            background: linear-gradient(90deg, #990000, var(--primary));
            color: white;
            border: none;
            padding: 15px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px var(--primary-glow);
            position: relative;
            overflow: hidden;
        }

        .btn-enviar::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: rgba(255,255,255,0.1);
            transform: rotate(45deg);
            transition: 0.5s;
            opacity: 0;
        }

        .btn-enviar:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--primary-glow);
        }

        .btn-enviar:hover::after {
            opacity: 1;
            left: 100%;
        }

        .btn-enviar:active { transform: translateY(1px); }
        .btn-enviar:disabled { filter: grayscale(1); cursor: not-allowed; transform: none; }

    </style>
</head>
<body>

<!-- TELA DE CARREGAMENTO -->
<div id="preloader">
    <div class="preloader-content">
        <h1 class="glitch" data-text="VIDIGAL">VIDIGAL</h1>
        <div class="progress-bar"><div class="progress"></div></div>
        <p class="preloader-text">ESTABELECENDO CONEXÃO SEGURA...</p>
    </div>
</div>

<!-- CALCULADORA -->
<div class="container">
    <h1 class="title glitch" data-text="VIDIGAL">VIDIGAL</h1>

    <div class="form-group">
        <label for="vendedor">Operacional (Nome):</label>
        <input type="text" id="vendedor" placeholder="Vulgo no jogo" autocomplete="off">
    </div>

    <div class="form-group">
        <label for="passaporte">Passaporte:</label>
        <input type="number" id="passaporte" placeholder="ID Numérico" autocomplete="off">
    </div>

    <div class="switch-container">
        <label for="parceria">Aplicar Valor de Parceria?</label>
        <label class="switch">
            <input type="checkbox" id="parceria">
            <span class="slider"></span>
        </label>
    </div>

    <div class="form-group">
        <label>Arsenal de Venda:</label>
        <div class="item-selector">
            <select id="item-select"></select>
            <input type="number" id="item-qtd" value="1" min="1">
            <button class="btn-add" onclick="adicionarItem()" title="Adicionar Item">+</button>
        </div>
    </div>

    <div class="items-list" id="lista-itens">
        <div style="color: var(--text-muted); text-align: center; margin-top: 15px; font-style: italic;">Carrinho vazio.</div>
    </div>

    <div class="results">
        <p>Total a cobrar: <span class="val-total" id="res-total">R$ 0</span></p>
        <p>Seu Lucro (35%): <span class="val-comissao" id="res-comissao">R$ 0</span></p>
        <p>Baú da Facção (65%): <span class="val-deposito" id="res-deposito">R$ 0</span></p>
    </div>

    <button class="btn-enviar" onclick="enviarWebhook()" id="btn-enviar">REGISTRAR VENDA</button>
</div>

<script>
    // Remover o Preloader após 2.2 segundos (tempo da animação da barra)
    window.addEventListener('load', () => {
        setTimeout(() => {
            const preloader = document.getElementById('preloader');
            preloader.style.opacity = '0';
            preloader.style.visibility = 'hidden';
        }, 2200);
    });

    // Tabela de Preços Extraída da Imagem
    const tabelaPrecos = {
        "FAJUTA": { normal: 170000, parceria: 120000 },
        "FIVE": { normal: 350000, parceria: 300000 },
        "TEC-9": { normal: 540000, parceria: 480000 },
        "MP-5": { normal: 600000, parceria: 450000 },
        "MICRO-UZI": { normal: 540000, parceria: 480000 },
        "AK-47": { normal: 660000, parceria: 600000 },
        "AK-MK2": { normal: 950000, parceria: 850000 },
        "G-36": { normal: 1100000, parceria: 1000000 },
        "AP-PISTOL": { normal: 600000, parceria: 540000 },
        "SMG-MK2": { normal: 850000, parceria: 780000 },
        "M-TAR": { normal: 1700000, parceria: 1500000 },
        "SHOTGUN": { normal: 1400000, parceria: 1200000 },
        "GLOCK RAJADA": { normal: 1400000, parceria: 1200000 },
        "M-4": { normal: 2600000, parceria: 2300000 },
        "HK-G3A3": { normal: 4200000, parceria: 3800000 },
        "AR VASCO": { normal: 3500000, parceria: 3300000 },
        "G3 FEMENINA": { normal: 3500000, parceria: 3300000 },
        "PENTE DUPLO": { normal: 3500000, parceria: 3300000 },
        "AR-15": { normal: 5500000, parceria: 5300000 }
    };

    const webhookURL = "https://discord.com/api/webhooks/1483712514180251649/CsEsi3BvvzARRCGBbn4I57Xcc0uH3PXSgd6DTgruCGOqrpU39T5ZjafPjajZ1K4_uAw1";
    let carrinho = [];

    // Inicialização
    const select = document.getElementById('item-select');
    for (let arma in tabelaPrecos) {
        let option = document.createElement('option');
        option.value = arma;
        option.textContent = arma;
        select.appendChild(option);
    }
    
    // Atualizar cálculos em tempo real se alternar a parceria
    document.getElementById('parceria').addEventListener('change', atualizarCalculos);

    function formatarDinheiro(valor) {
        return "R$ " + valor.toLocaleString('pt-BR');
    }

    function adicionarItem() {
        const nomeItem = document.getElementById('item-select').value;
        const qtdInput = document.getElementById('item-qtd');
        const qtd = parseInt(qtdInput.value);
        
        if (qtd > 0) {
            carrinho.push({ item: nomeItem, quantidade: qtd });
            renderizarCarrinho();
            atualizarCalculos();
            qtdInput.value = 1; // Reseta a quantidade após adicionar
        }
    }

    function removerItem(index) {
        carrinho.splice(index, 1);
        renderizarCarrinho();
        atualizarCalculos();
    }

    function renderizarCarrinho() {
        const lista = document.getElementById('lista-itens');
        lista.innerHTML = '';

        if (carrinho.length === 0) {
            lista.innerHTML = '<div style="color: var(--text-muted); text-align: center; margin-top: 15px; font-style: italic;">Carrinho vazio.</div>';
            return;
        }

        carrinho.forEach((obj, index) => {
            lista.innerHTML += `
                <div class="item-row">
                    <span><strong>${obj.quantidade}x</strong> ${obj.item}</span>
                    <span class="remove-btn" onclick="removerItem(${index})">X</span>
                </div>
            `;
        });
        
        // Rolar a lista para baixo automaticamente se houver muitos itens
        lista.scrollTop = lista.scrollHeight;
    }

    function atualizarCalculos() {
        const isParceria = document.getElementById('parceria').checked;
        let total = 0;

        carrinho.forEach(obj => {
            const precoUnitario = isParceria ? tabelaPrecos[obj.item].parceria : tabelaPrecos[obj.item].normal;
            total += precoUnitario * obj.quantidade;
        });

        const comissao = total * 0.35;
        const deposito = total * 0.65;

        // Animação leve nos números ao mudar o valor
        const elements = ['res-total', 'res-comissao', 'res-deposito'];
        elements.forEach(id => {
            const el = document.getElementById(id);
            el.style.opacity = 0;
            setTimeout(() => {
                el.style.opacity = 1;
            }, 100);
        });

        setTimeout(() => {
            document.getElementById('res-total').textContent = formatarDinheiro(total);
            document.getElementById('res-comissao').textContent = formatarDinheiro(comissao);
            document.getElementById('res-deposito').textContent = formatarDinheiro(deposito);
        }, 100);
    }

    async function enviarWebhook() {
        const vendedor = document.getElementById('vendedor').value.trim();
        const passaporte = document.getElementById('passaporte').value.trim();
        const isParceria = document.getElementById('parceria').checked;
        const btn = document.getElementById('btn-enviar');

        if (!vendedor || !passaporte) {
            alert("⚠️ PREENCHA SEU NOME E PASSAPORTE ANTES DE ENVIAR!");
            document.getElementById('vendedor').focus();
            return;
        }

        if (carrinho.length === 0) {
            alert("⚠️ ADICIONE PELO MENOS UM ITEM AO CARRINHO!");
            return;
        }

        btn.innerHTML = "📡 TRANSMITINDO...";
        btn.disabled = true;

        let total = 0;
        let itensString = "";

        carrinho.forEach(obj => {
            const precoUnitario = isParceria ? tabelaPrecos[obj.item].parceria : tabelaPrecos[obj.item].normal;
            total += precoUnitario * obj.quantidade;
            itensString += `**${obj.quantidade}x** ${obj.item}\n`;
        });

        const comissao = total * 0.35;
        const deposito = total * 0.65;

        const payload = {
            username: "Sistema Vidigal",
            avatar_url: "https://i.imgur.com/R388Yle.png",
            embeds: [
                {
                    title: "🔫 RELATÓRIO DE VENDA DE ARMAMENTO",
                    description: "Registro inserido no banco de dados da facção.",
                    color: 16711680, // Vermelho Forte
                    thumbnail: {
                        url: "https://i.imgur.com/R388Yle.png"
                    },
                    fields: [
                        { name: "👤 Operacional", value: `\`${vendedor}\``, inline: true },
                        { name: "🛂 Passaporte", value: `\`${passaporte}\``, inline: true },
                        { name: "🤝 Parceria?", value: isParceria ? "`SIM ✅`" : "`NÃO ❌`", inline: true },
                        { name: "🛒 Arsenal Negociado", value: itensString, inline: false },
                        { name: "💰 Total Arrecadado", value: `\`${formatarDinheiro(total)}\``, inline: false },
                        { name: "💸 Parte do Operacional (35%)", value: `\`${formatarDinheiro(comissao)}\``, inline: true },
                        { name: "🏦 Depositar no Baú (65%)", value: `\`${formatarDinheiro(deposito)}\``, inline: true }
                    ],
                    footer: { 
                        text: "Vidigal RP - Controle Financeiro", 
                        icon_url: "https://i.imgur.com/R388Yle.png" 
                    },
                    timestamp: new Date().toISOString()
                }
            ]
        };

        try {
            const response = await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("✅ VENDA REGISTRADA COM SUCESSO NO DISCORD!");
                
                // Limpar formulário
                carrinho = [];
                renderizarCarrinho();
                atualizarCalculos();
                document.getElementById('vendedor').value = '';
                document.getElementById('passaporte').value = '';
                document.getElementById('parceria').checked = false;
            } else {
                alert("❌ Erro ao comunicar com o servidor do Discord.");
            }
        } catch (error) {
            console.error(error);
            alert("❌ Erro de conexão. Verifique sua internet.");
        } finally {
            btn.innerHTML = "REGISTRAR VENDA";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
